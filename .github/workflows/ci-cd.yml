name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Make Maven Wrapper Executable
        working-directory: ./springboot/app
        run: chmod +x ./mvnw

      - name: Build Spring Boot JAR
        working-directory: ./springboot/app
        run: ./mvnw clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Replace image names in docker-compose.yml
        run: |
          sed -i "s|image: angular-app|image: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest|" docker-compose.yml
          sed -i "s|image: spring-app|image: ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest|" docker-compose.yml

      - name: Run docker-compose
        run: |
          docker-compose up -d
          docker ps
